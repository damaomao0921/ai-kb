<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="--accent: {{ accent }}; border:1px solid #E4DCCD; border-left:3px solid var(--accent); border-radius:10px; background:#FBF8F1; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
  <div onClick="{{ toggle }}" style="display:flex; align-items:center; gap:11px; padding:13px 15px; cursor:pointer; user-select:none">
    <span style="font:700 9.5px/1 ui-monospace,'SF Mono',Menlo,monospace; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); background:color-mix(in srgb, var(--accent) 12%, transparent); padding:4px 7px; border-radius:5px; flex-shrink:0">Prompt</span>
    <span style="flex:1; font-size:13.5px; font-weight:600; color:#2A251E; line-height:1.45">{{ title }}</span>
    <button onClick="{{ copy }}" style="cursor:pointer; font:600 11.5px/1 inherit; color:{{ copyColor }}; background:color-mix(in srgb, {{ copyColor }} 11%, transparent); border:1px solid color-mix(in srgb, {{ copyColor }} 30%, transparent); padding:6px 11px; border-radius:7px; white-space:nowrap; flex-shrink:0">{{ copyLabel }}</button>
    <span style="color:#A89C88; font-size:15px; transition:transform .22s ease; transform:{{ chev }}; flex-shrink:0">›</span>
  </div>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div style="border-top:1px solid #E9E1D2">
      <pre style="margin:0; padding:15px 16px; font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace; font-size:12.5px; color:#3B352B; white-space:pre-wrap; word-break:break-word; line-height:1.7; max-height:340px; overflow:auto; background:#F6F1E6">{{ prompt }}</pre>
      <sc-if value="{{ hasTip }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex; gap:8px; padding:11px 16px; font-size:12.5px; color:#6F6557; line-height:1.6; background:#FBF8F1; border-top:1px solid #EFE8DA">
          <span style="font:700 9.5px/1.5 ui-monospace,Menlo,monospace; letter-spacing:1px; color:var(--accent); flex-shrink:0">TIP</span>
          <span style="font-style:italic">{{ tip }}</span>
        </div>
      </sc-if>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:540,&quot;height&quot;:58},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;访谈提纲设计 + 偏见自检&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;prompt&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;你是一名资深的用户研究方法学家……&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tip&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;逼 AI 当反方挑你毛病，而不是顺着假设附和。&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#9A3412&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { open:false, copied:false };
  renderVals(){
    const tip = this.props.tip;
    return {
      accent: this.props.accent || '#9A3412',
      title: this.props.title || 'Prompt',
      prompt: this.props.prompt || '',
      tip: tip || '',
      hasTip: !!(tip && String(tip).trim()),
      open: this.state.open,
      chev: this.state.open ? 'rotate(90deg)' : 'rotate(0deg)',
      copyLabel: this.state.copied ? '✓ 已复制' : '复制',
      copyColor: this.state.copied ? '#2F6E5E' : (this.props.accent || '#9A3412'),
      toggle: () => this.setState(s => ({ open: !s.open })),
      copy: (e) => {
        if (e && e.stopPropagation) e.stopPropagation();
        const t = this.props.prompt || '';
        try { navigator.clipboard.writeText(t); } catch(_) {}
        this.setState({ copied:true });
        clearTimeout(this._t);
        this._t = setTimeout(() => this.setState({ copied:false }), 1500);
      }
    };
  }
}
</script>
</body>
</html>
